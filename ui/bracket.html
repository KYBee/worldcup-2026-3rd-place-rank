<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>킹우의수 | 최종 대진표</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        .bracket-outer-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .simplified-bracket {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 40px;
            align-items: center;
            margin-bottom: 100px;
        }

        .round-col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .match-pair {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .match-connector {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: calc(100% - 20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-left: none;
            right: -20px;
            pointer-events: none;
            border-radius: 0 4px 4px 0;
        }

        .right-side .match-connector {
            border-right: none;
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            right: auto;
            left: -20px;
            border-radius: 4px 0 0 4px;
        }

        .bracket-slot {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            position: relative;
            z-index: 1;
        }

        .bracket-slot:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .right-side .bracket-slot:hover {
            transform: translateX(-5px);
        }

        .right-side .bracket-slot {
            flex-direction: row-reverse;
        }

        .flag-mini {
            width: 24px;
            height: 16px;
            background: transparent;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .team-name-mini {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            text-align: center;
        }

        .trophy-container {
            position: relative;
            padding: 40px;
        }

        .trophy-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .trophy-image {
            font-size: 8rem;
            filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.3));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .final-match-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 255, 255, 0.02));
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .final-teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .final-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .final-vs {
            font-weight: 900;
            font-size: 1.2rem;
            opacity: 0.2;
            letter-spacing: 4px;
        }

        .bracket-export-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 1200px) {
            .simplified-bracket {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .round-col {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }

            .match-connector {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .round-col {
                grid-template-columns: 1fr;
            }

            .trophy-image {
                font-size: 5rem;
            }

            .trophy-glow {
                width: 200px;
                height: 200px;
            }

            .final-match-card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-container">
            <a href="simulator.html" class="logo">킹우의수</a>
        </div>
        <nav>
            <a href="simulator.html">시뮬레이터</a>
            <a href="groups.html">조별순위</a>
            <a href="schedule.html">스케줄</a>
        </nav>
    </header>

    <main class="app-container" style="max-width: 1500px; padding-top: 120px;">
        <header-section style="text-align: center;">
            <h1 style="font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; letter-spacing: -2px; margin-bottom: 5px;">
                ROAD TO THE FINAL
            </h1>
            <p class="subtitle" style="font-size: var(--subtitle-size); opacity: 0.6;">FIFA WORLD CUP 2026 BRACKET</p>
            <div class="bracket-export-actions">
                <button id="download-bracket-btn" class="btn btn-primary">32강 대진 다운로드</button>
            </div>
        </header-section>

        <div class="bracket-outer-container animate delay-1">
            <div id="bracket-export-target" class="simplified-bracket">
                <!-- LEFT: R32 (16 teams) -->
                <div class="round-col">
                    <div class="round-tag">ROUND OF 32</div>
                    <div id="round32-left"></div>
                </div>

                <!-- CENTER: Trophy & Final -->
                <div class="center-stage">
                    <div class="trophy-container">
                        <div class="trophy-glow"></div>
                        <div class="trophy-image">🏆</div>
                    </div>

                    <div class="final-match-card">
                        <div class="round-tag" style="color: var(--primary); opacity: 1;">THE FINAL</div>
                        <div class="final-teams">
                            <div class="final-team">
                                <div class="flag-mini" style="width: 40px; height: 26px;"></div>
                                <span style="font-weight: 800; font-size: 1.1rem; opacity: 0.3;">TBD</span>
                            </div>
                            <div class="final-vs">VS</div>
                            <div class="final-team">
                                <div class="flag-mini" style="width: 40px; height: 26px;"></div>
                                <span style="font-weight: 800; font-size: 1.1rem; opacity: 0.3;">TBD</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT: R32 (16 teams) -->
                <div class="round-col right-side">
                    <div class="round-tag">ROUND OF 32</div>
                    <div id="round32-right"></div>
                </div>
            </div>

            <!-- 3RD PLACE RANKINGS -->
            <div class="ranking-wrapper animate delay-2" style="margin-top: 80px; width: 100%;">
                <div class="round-tag" style="font-size: 1.2rem; margin-bottom: 30px; text-align: center;">RANKING OF
                    THIRD-PLACED TEAMS</div>

                <div class="glass-card" style="padding: 0; max-width: 1200px; margin: 0 auto; overflow: hidden;">
                    <table class="standing-table">
                        <thead>
                            <tr>
                                <th class="rank-cell">#</th>
                                <th class="team-cell">팀</th>
                                <th class="stat-cell">승</th>
                                <th class="stat-cell">무</th>
                                <th class="stat-cell">패</th>
                                <th class="stat-cell mobile-hide">득</th>
                                <th class="stat-cell mobile-hide">실</th>
                                <th class="stat-cell">차</th>
                                <th class="stat-cell mobile-hide">피파랭킹</th>
                                <th class="pts-cell">점수</th>
                            </tr>
                        </thead>
                        <tbody id="third-place-ranking-body"></tbody>
                    </table>
                </div>

                <p
                    style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-dim); opacity: 0.5;">
                    * 상위 8개 3위 팀이 32강에 진출합니다. 강조된 팀은 잠정 진출 상태입니다.
                    <br>* 페어플레이 점수는 0점으로 가정합니다. 동률 지표가 모두 같으면 FIFA 랭킹으로 비교합니다.
                </p>
            </div>
        </div>
    </main>
    <script type="module">
        import {
            buildScoresWithDefaultDraw,
            computeAllGroupStandings,
            generateRoundOf32,
            getTeamCode,
            getTeamFlag,
            getTeamLabel,
            loadTournamentData,
            rankThirdPlaceTeams,
            readScores
        } from "./app-core.js";

        const leftContainer = document.getElementById("round32-left");
        const rightContainer = document.getElementById("round32-right");
        const thirdPlaceBody = document.getElementById("third-place-ranking-body");
        const downloadButton = document.getElementById("download-bracket-btn");
        const exportTarget = document.getElementById("bracket-export-target");

        function formatTimestamp(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            const h = String(date.getHours()).padStart(2, "0");
            const min = String(date.getMinutes()).padStart(2, "0");
            const s = String(date.getSeconds()).padStart(2, "0");
            return `${y}${m}${d}-${h}${min}${s}`;
        }

        async function downloadBracketPng() {
            if (typeof window.html2canvas !== "function") {
                alert("이미지 캡처 라이브러리를 불러오지 못했습니다.");
                return;
            }

            const originalLabel = downloadButton.textContent;
            downloadButton.disabled = true;
            downloadButton.textContent = "PNG 생성 중...";

            try {
                // Force desktop layout for capture
                const originalStyle = exportTarget.getAttribute('style') || '';
                exportTarget.style.width = '1400px';
                exportTarget.style.minWidth = '1400px';

                const canvas = await window.html2canvas(exportTarget, {
                    scale: 2,
                    backgroundColor: null,
                    useCORS: true,
                    logging: false,
                    windowWidth: 1400
                });

                // Restore styles
                exportTarget.setAttribute('style', originalStyle);

                const link = document.createElement("a");
                link.href = canvas.toDataURL("image/png");
                link.download = `world-cup-bracket-${formatTimestamp(new Date())}.png`;
                link.click();
            } catch (error) {
                alert(`PNG 생성 실패: ${error.message}`);
            } finally {
                downloadButton.disabled = false;
                downloadButton.textContent = originalLabel;
            }
        }

        function formatSource(source) {
            if (!source) return "";

            const leadingNumber = String(source).match(/^([123])([A-L])$/);
            if (leadingNumber) {
                return `${leadingNumber[2]}${leadingNumber[1]}`;
            }

            const trailingNumber = String(source).match(/^([A-L])([123])$/);
            if (trailingNumber) {
                return `${trailingNumber[1]}${trailingNumber[2]}`;
            }

            return String(source);
        }

        function renderParticipantRow(participant, teams) {
            if (!participant) {
                return `
                    <div class="bracket-slot">
                        <div class="flag-mini"></div><span class="team-name-mini">미정 (TBD)</span>
                    </div>
                `;
            }
            const flagSrc = getTeamFlag(participant.teamId, teams);
            const label = getTeamLabel(participant.teamId, teams);
            const code = getTeamCode(participant.teamId, teams);
            const source = formatSource(participant.source);
            return `
                <div class="bracket-slot">
                    ${flagSrc ? `<img class="flag-mini" src="${flagSrc}" alt="">` : `<div class="flag-mini"></div>`}
                    <span class="team-name-mini">${label} (${source})</span>
                </div>
            `;
        }

        function renderRound32(round32Matches, teams) {
            const leftMatches = round32Matches.slice(0, 8);
            const rightMatches = round32Matches.slice(8);

            leftContainer.innerHTML = leftMatches
                .map((match) => `
                    <div class="match-pair">
                        ${renderParticipantRow(match.home, teams)}
                        ${renderParticipantRow(match.away, teams)}
                        <div class="match-connector"></div>
                    </div>
                `)
                .join("");

            rightContainer.innerHTML = rightMatches
                .map((match) => `
                    <div class="match-pair">
                        ${renderParticipantRow(match.home, teams)}
                        ${renderParticipantRow(match.away, teams)}
                        <div class="match-connector"></div>
                    </div>
                `)
                .join("");
        }

        function renderThirdPlaceTable(thirdRanking, teams) {
            thirdPlaceBody.innerHTML = thirdRanking
                .map((entry, index) => {
                    const rowClass = index < 8 ? "qualify-zone" : "eliminated-zone";
                    const flagSrc = getTeamFlag(entry.teamId, teams);
                    const label = getTeamLabel(entry.teamId, teams);
                    const code = getTeamCode(entry.teamId, teams);
                    return `
                        <tr class="${rowClass}">
                            <td class="num-cell">${index + 1}</td>
                            <td class="team-cell">
                                <div class="team-display">
                                    ${flagSrc ? `<img class="flag-mini" src="${flagSrc}" alt="">` : `<div class="flag-mini"></div>`}
                                    <span class="desktop-only">${label} (${entry.groupId})</span>
                                    <span class="mobile-only" style="font-weight:800;">${code} (${entry.groupId})</span>
                                </div>
                            </td>
                            <td class="stat-cell">${entry.win}</td>
                            <td class="stat-cell">${entry.draw}</td>
                            <td class="stat-cell">${entry.loss}</td>
                            <td class="stat-cell mobile-hide">${entry.gf}</td>
                            <td class="stat-cell mobile-hide">${entry.ga}</td>
                            <td class="stat-cell">${entry.gd}</td>
                            <td class="stat-cell mobile-hide">${entry.fifaRanking}</td>
                            <td class="pts-cell">${entry.pts}</td>
                        </tr>
                    `;
                })
                .join("");
        }

        async function init() {
            try {
                const data = await loadTournamentData();
                const scores = readScores();
                const effectiveScores = buildScoresWithDefaultDraw(data, scores);
                const groupRankings = computeAllGroupStandings(data, effectiveScores);
                const round32Matches = generateRoundOf32(groupRankings);
                const thirdRanking = rankThirdPlaceTeams(groupRankings);

                renderRound32(round32Matches, data.teams);
                renderThirdPlaceTable(thirdRanking, data.teams);
            } catch (error) {
                leftContainer.innerHTML = `<div class="bracket-slot"><span class="team-name-mini">로딩 실패: ${error.message}</span></div>`;
                rightContainer.innerHTML = "";
                thirdPlaceBody.innerHTML = "";
            }
        }

        downloadButton.addEventListener("click", downloadBracketPng);
        init();
    </script>
</body>

</html>
