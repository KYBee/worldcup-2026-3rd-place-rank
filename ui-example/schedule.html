<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>킹우의수 | 스케줄</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .match-card {
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            align-items: center;
            padding: 24px;
            width: 100%;
        }

        .match-time {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .team-vs {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            white-space: nowrap;
        }

        .team-vs.home {
            justify-content: flex-end;
            text-align: right;
        }

        .team-vs.away {
            justify-content: flex-start;
            text-align: left;
        }

        .vs-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 900;
            opacity: 0.2;
            width: 40px;
            text-align: center;
        }

        .venue {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-dim);
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .match-card {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 15px;
                padding: 20px;
            }

            .match-teams {
                flex-direction: row;
                justify-content: center;
                gap: 15px;
            }

            .team-vs {
                flex: none;
                font-size: 0.95rem;
            }

            .venue {
                text-align: center;
                border-top: 1px solid rgba(255, 255, 255, 0.05);
                padding-top: 12px;
            }
        }
    </style>
</head>

        const allFixtures = scheduleData.fixtures;

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 (${days[date.getDay()]})`;
        }

        function renderSchedule(fixtures) {
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';

            if (fixtures.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 50px; opacity: 0.5;">검색 결과가 없습니다.</div>';
                return;
            }

            let lastDate = '';

            fixtures.forEach(match => {
                const dateHeader = formatDate(match.date);
                if (dateHeader !== lastDate) {
                    const sep = document.createElement('div');
                    sep.className = 'date-separator';
                    sep.innerText = dateHeader;
                    container.appendChild(sep);
                    lastDate = dateHeader;
                }

                const card = document.createElement('div');
                card.className = 'glass-card match-card';

                const timeStr = match.kickoffUtc.substring(11, 16);

                card.innerHTML = `
                    <div class="match-time">${timeStr}</div>
                    <div class="match-teams">
                        <div class="team-vs home">
                            <span>${match.homeTeam}</span>
                            <div class="flag"></div>
                        </div>
                        <div class="vs-label">VS</div>
                        <div class="team-vs away">
                            <div class="flag"></div>
                            <span>${match.awayTeam}</span>
                        </div>
                    </div>
                    <div class="venue">${match.groupId}조</div>
                `;
                container.appendChild(card);
            });
        }

        // Search logic
        const searchInput = document.getElementById('schedule-search');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = allFixtures.filter(f =>
                f.homeTeam.toLowerCase().includes(query) ||
                f.awayTeam.toLowerCase().includes(query)
            );
            renderSchedule(filtered);
        });

        // Initial render
        renderSchedule(allFixtures);
    </script>
