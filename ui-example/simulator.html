<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>킹우의수 | 시뮬레이터</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .simulator-layout {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .standing-section {
            width: 100%;
        }

        .matches-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .group-date-header {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        .score-input-card {
            display: grid;
            grid-template-columns: 1fr 180px 1fr;
            align-items: center;
            padding: 24px;
            position: relative;
        }

        .team-vs {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.15rem;
        }

        .team-vs.home {
            justify-content: flex-end;
            text-align: right;
        }

        .team-vs.away {
            justify-content: flex-start;
            text-align: left;
        }

        .score-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .score-field {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-glass);
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            transition: var(--transition);
            /* Hide arrows */
            appearance: textfield;
            -moz-appearance: textfield;
        }

        .score-field::-webkit-outer-spin-button,
        .score-field::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .score-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(255, 255, 255, 0.1);
        }

        .vs-label {
            color: var(--text-dim);
            opacity: 0.3;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .group-selector-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .centered-footer {
            display: flex;
            justify-content: center;
            padding: 60px 0 100px;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .group-selector-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .score-input-card {
                grid-template-columns: 1fr;
                gap: 15px;
                text-align: center;
                padding: 20px;
            }

            .team-vs.home,
            .team-vs.away {
                justify-content: center;
                text-align: center;
            }

            .team-vs {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-container">
            <a href="simulator.html" class="logo">킹우의수</a>
        </div>
        <nav>
            <a href="simulator.html" class="active">시뮬레이터</a>
            <a href="groups.html">조별순위</a>
            <a href="schedule.html">스케줄</a>
        </nav>
    </header>

    <main class="app-container">
        <!-- Step 1: Landing (Initially Visible) -->
        <section id="landing-stage" class="hero-landing animate">
            <h1>월드컵 32강<br><span
                    style="background: linear-gradient(90deg, #ff3333, #00cc66, #0066ff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); font-weight: 900;">경우의
                    수</span> 계산기</h1>
            <p class="subtitle">FIFA World Cup 2026의 조별리그 결과를 직접 시뮬레이션하고, 당신만의 32강 브래킷을 만들어보세요.</p>
            <button class="btn btn-primary" onclick="startSimulator()">시작하기 (Start) ➔</button>
        </section>

        <!-- Step 2: Simulator (Initially Hidden) -->
        <section id="simulator-stage" class="hidden animate" style="width: 100%;">
            <header-section>
                <h1>시나리오 시뮬레이터</h1>
                <p class="subtitle">모든 경기의 예상 스코어를 입력하세요. 조 순위와 32강 대진이 실시간으로 계산됩니다.</p>
            </header-section>

            <div class="simulator-layout">
                <!-- Group Selector -->
                <div class="group-selector-grid" id="group-nav"></div>

                <!-- Standing Table -->
                <div class="standing-section">
                    <div class="glass-card" style="padding: 30px;">
                        <h2 id="current-group-title" style="margin-bottom: 20px;">A조 실시간 순위</h2>
                        <div class="standing-table-container">
                            <table class="standing-table">
                                <thead>
                                    <tr>
                                        <th class="num-cell">순위</th>
                                        <th class="team-cell">팀</th>
                                        <th class="stat-cell">승</th>
                                        <th class="stat-cell">무</th>
                                        <th class="stat-cell">패</th>
                                        <th class="pts-cell">점수</th>
                                    </tr>
                                </thead>
                                <tbody id="standing-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Match List -->
                <div class="matches-section" id="match-list"></div>
            </div>

            <div class="centered-footer">
                <a href="bracket.html" class="btn btn-primary btn-lg">최종 결과 보기 및 브래킷 생성 ➔</a>
            </div>
        </section>
    </main>

        let currentGroup = 'A';
        const scores = {}; // matchId -> {home, away}

        function startSimulator() {
            document.getElementById('landing-stage').classList.add('hidden');
            document.getElementById('simulator-stage').classList.remove('hidden');
            initGroupNav();
            renderGroup('A');
        }

        function initGroupNav() {
            const nav = document.getElementById('group-nav');
            nav.innerHTML = '';
            ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].forEach(g => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${g === currentGroup ? 'active' : ''}`;
                btn.innerText = `${g}조`;
                btn.onclick = () => renderGroup(g);
                nav.appendChild(btn);
            });
        }

        function renderGroup(groupId) {
            currentGroup = groupId;
            document.getElementById('current-group-title').innerText = `${groupId}조 실시간 순위`;
            initGroupNav();

            // Render Matches
            const groupFixtures = fixtures.filter(f => f.groupId === groupId);
            const matchList = document.getElementById('match-list');
            matchList.innerHTML = '';

            groupFixtures.forEach(m => {
                const card = document.createElement('div');
                card.className = 'glass-card score-input-card';

                const score = scores[m.matchId] || { home: '', away: '' };

                card.innerHTML = `
                    <div style="position: absolute; top: 12px; left: 24px;" class="group-date-header">${m.date}</div>
                    <div class="team-vs home">
                        <span>${m.homeTeam}</span><div class="flag"></div>
                    </div>
                    <div class="score-box">
                        <input type="number" class="score-field" value="${score.home}" oninput="updateScore('${m.matchId}', 'home', this.value)">
                        <span class="vs-label">VS</span>
                        <input type="number" class="score-field" value="${score.away}" oninput="updateScore('${m.matchId}', 'away', this.value)">
                    </div>
                    <div class="team-vs away">
                        <div class="flag"></div><span>${m.awayTeam}</span>
                    </div>
                `;
                matchList.appendChild(card);
            });

            updateStandings();
        }

        function updateScore(matchId, side, value) {
            if (!scores[matchId]) scores[matchId] = { home: '', away: '' };
            scores[matchId][side] = value;
            updateStandings();
        }

        function updateStandings() {
            // Logic to compute standings based on 'scores' and 'fixtures'
            // For now, mockup but showing teams
            const groupTeams = [...new Set(fixtures.filter(f => f.groupId === currentGroup).map(f => [f.homeTeam, f.awayTeam]).flat())];
            const tbody = document.getElementById('standing-tbody');
            tbody.innerHTML = groupTeams.map((t, i) => `
                <tr>
                    <td class="num-cell">${i + 1}</td>
                    <td class="team-cell"><div class="team-display"><div class="flag"></div><span>${t}</span></div></td>
                    <td class="stat-cell">0</td><td class="stat-cell">0</td><td class="stat-cell">0</td>
                    <td class="pts-cell">0</td>
                </tr>
            `).join('');
